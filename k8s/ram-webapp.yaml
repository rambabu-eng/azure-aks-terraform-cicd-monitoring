apiVersion: apps/v1
kind: Deployment
metadata:
  name: ram-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ram-webapp
  template:
    metadata:
      labels:
        app: ram-webapp
    spec:
      containers:
        - name: ram-webapp
          image: acraksdemodev1h7qqd.azurecr.io/ram-aks-web:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ram-webapp-service
spec:
  type: LoadBalancer
  selector:
    app: ram-webapp
  ports:
    - port: 80
      targetPort: 80